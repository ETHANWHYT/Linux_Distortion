# CustomTails GRUB Configuration
# Boot loader configuration for BIOS/UEFI systems

# Boot menu timeout (in seconds)
set timeout=10

# Default boot entry
set default=0

# Theme
set theme=(memdisk)/boot/grub/themes/starfield/theme.txt

# Submenu for easy navigation
submenu 'CustomTails Boot Options' {
    # Boot with persistence (recommended)
    menuentry 'Live System with Persistence' {
        insmod gzio
        insmod part_msdos
        insmod ext2
        insmod squash4
        set root='(hd0,msdos1)'
        
        linux /boot/vmlinuz boot=live persistence quiet splash
        initrd /boot/initrd.img
    }
    
    # Boot without persistence
    menuentry 'Live System (No Persistence)' {
        insmod gzio
        insmod part_msdos
        insmod ext2
        insmod squash4
        set root='(hd0,msdos1)'
        
        linux /boot/vmlinuz boot=live quiet splash
        initrd /boot/initrd.img
    }
    
    # Boot with toram (entire system loaded to RAM)
    menuentry 'Live System (RAM - Fastest)' {
        insmod gzio
        insmod part_msdos
        insmod ext2
        insmod squash4
        set root='(hd0,msdos1)'
        
        linux /boot/vmlinuz boot=live toram quiet splash
        initrd /boot/initrd.img
    }
    
    # Boot in verbose mode (for troubleshooting)
    menuentry 'Live System (Verbose - Debug)' {
        insmod gzio
        insmod part_msdos
        insmod ext2
        insmod squash4
        set root='(hd0,msdos1)'
        
        linux /boot/vmlinuz boot=live verbose
        initrd /boot/initrd.img
    }
    
    # Boot in failsafe mode
    menuentry 'Live System (Failsafe)' {
        insmod gzio
        insmod part_msdos
        insmod ext2
        insmod squash4
        set root='(hd0,msdos1)'
        
        linux /boot/vmlinuz boot=live acpi=off pci=off noapic noacpi nomodeset
        initrd /boot/initrd.img
    }
}

# UEFI options (if supported)
if [ "${grub_platform}" = "efi" ]; then
    echo "UEFI system detected"
    set gfxmode=1024x768
    insmod efi_gop
    insmod efi_uga
else
    # BIOS options
    echo "BIOS system detected"
fi

# Other useful boot parameters you can add:
# nomodeset - Disable kernel mode setting (for graphics issues)
# nosplash - Skip the splash screen
# debug - Enable kernel debugging
# verbose - More verbose output
# quiet - Minimal output
# splash - Show splash screen
# persistence - Enable persistent storage
# toram - Load entire system to RAM
# noacpi - Disable ACPI
# noapic - Disable APIC
# acpi=off - Disable ACPI completely
